<!DOCTYPE html>
<html>
<head>

<title>Upload Resource</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.upload-card{
background:white;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="upload-card">

<h3 class="text-center mb-3">Upload Resource</h3>

<form action="/upload" method="post" enctype="multipart/form-data">

<input name="title" class="form-control mb-3" placeholder="Title">

<input name="subject" class="form-control mb-3" placeholder="Subject">

<input type="file" name="file" class="form-control mb-3">

<button class="btn btn-primary w-100">Upload</button>

</form>

<br>

<a href="/dashboard" class="btn btn-secondary w-100">Back</a>

</div>

</body>
</html>
