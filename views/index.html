<!DOCTYPE html>
<html>
<head>
<title>Student Resource Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.hero{
height:90vh;
display:flex;
align-items:center;
}

.card{
border:none;
border-radius:15px;
}

.feature-icon{
font-size:40px;
margin-bottom:15px;
color:#667eea;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
<div class="container">
<a class="navbar-brand fw-bold" href="#">📚 ResourceHub</a>

<div>
<a href="/" class="btn btn-light me-2">Login</a>
<a href="/register" class="btn btn-warning">Register</a>
</div>

</div>
</nav>

<div class="container hero">

<div class="row w-100">

<div class="col-md-6">

<h1 class="display-4 fw-bold">Share Knowledge, Grow Together</h1>

<p class="lead">
Upload notes, download resources, and collaborate with students easily.
</p>

<a href="/register" class="btn btn-lg btn-warning">
Get Started
</a>

</div>

<div class="col-md-6 text-center">

<i class="fas fa-book-open" style="font-size:150px;"></i>

</div>

</div>

</div>

<div class="container mb-5">

<div class="row text-dark">

<div class="col-md-4">
<div class="card p-4 shadow">
<div class="text-center">
<i class="fas fa-upload feature-icon"></i>
<h4>Upload Notes</h4>
<p>Share study materials with others</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 shadow">
<div class="text-center">
<i class="fas fa-download feature-icon"></i>
<h4>Download Resources</h4>
<p>Access useful learning content</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 shadow">
<div class="text-center">
<i class="fas fa-users feature-icon"></i>
<h4>Collaborate</h4>
<p>Connect with students easily</p>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
